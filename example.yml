---
- hosts: all
  become: yes
  become_method: sudo
  roles:
    - { role: geerlingguy.apache }
  tasks:
    - name: copy conf file
      become: yes
      copy:
        src: files/config/apache.conf
        dest: /etc/apache2/apache2.conf
        owner: root
        group: root
        mode: 0644

    - name: copy index file
      become: yes
      copy:
        src: files/site/index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: 0644
